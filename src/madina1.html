<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>
    
    <header class="bg-[#6E6E6E] h-auto lg:h-[440px] pb-[50px] lg:pb-0">
        <div class="flex flex-col lg:flex-row justify-between max-w-[1200px] m-auto items-center p-[30px] gap-[20px]">
            <img class="w-[161px] h-[32px]" src="./img/Logo.png" alt="">
            <div class=" border-[2px] border-white rounded-[12px] flex items-center p-[15px] w-full lg:w-[443px]">
                <input type="text" placeholder="Search bar"
                    class="bg-transparent outline-none text-[#E5E5E5] placeholder:text-gray-300 w-full">
                <img src="./img/Search.png" alt="">
            </div>

            <div class="flex flex-col lg:flex-row gap-[20px] w-full lg:w-[600px] lg:ml-10 items-center">
                <p class="  text-[white] text-[20px]">Category <span class="text-[white]">▼</span> </p>
                <p class=" text-[white] text-[20px]">Become an Mentor</p>
            </div>
            <div class="flex gap-[20px]">
                <button
                    class="w-[111px] h-[48px] border-[1px] border-solid border-[#FFFFFF] rounded-[8px]  text-[white] text-[20px]">Login</button>
                <button class="w-[129px] h-[48px] rounded-[8px] bg-[#F72585]  text-[white] text-[20px]">Sign Up</button>
            </div>
        </div>
        <nav
            class="flex flex-wrap gap-[40px] mt-[50px]  text-[#ffffff] hover:text-[#000000] text-[17px] pl-[70px] pr-[60px] items-center justify-center mb-[30px]">
            <p>Home</p>
            <p>About</p>
            <p>Blog</p>
            <p>Contact</p>
            <p>Services</p>
        </nav>

    </header>
   
</body>
</html>
